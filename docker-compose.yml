services:
  potato_bot:
    image: ${POTATO_BOT_IMAGE:-potato-chat-bot:local}
    build:
      context: .
    container_name: potato_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - potato_data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 1.0

volumes:
  potato_data:
    name: potato_bot_data
